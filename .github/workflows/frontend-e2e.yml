# Frontend E2E tests (PB-201.3 / HC-201.3)
# Runs Playwright against Vite dev server; no backend required (mocked in specs).
name: Frontend E2E

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'common/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'common/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only for CI speed)
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --project=chromium

      - name: Upload test results and report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            frontend/test-results
            frontend/playwright-report
          retention-days: 7
